kind = "web"
previewPath = "/data-marketplace/"
title = "AI Data Marketplace"
version = "1.0.0"
id = "artifacts/data-marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/data-marketplace/" ]
localPort = 20550

[services.development]
run = "pnpm --filter @workspace/data-marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/data-marketplace", "run", "build" ]
publicDir = "artifacts/data-marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20550"
BASE_PATH = "/data-marketplace/"
